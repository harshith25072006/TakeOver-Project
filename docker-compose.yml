# Local development database for DAZZ Manager.
# Usage: `docker compose up -d` then `npm run db:migrate`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dazz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dazz
      POSTGRES_PASSWORD: dazz_dev_password
      POSTGRES_DB: dazz_manager
    ports:
      - "5432:5432"
    volumes:
      - dazz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dazz -d dazz_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dazz_pgdata:
    name: dazz_pgdata
